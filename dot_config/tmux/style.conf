#
# styles
#
# Color variables ($black, $blue, …) are defined in gruvbox.conf,
# which tmux.conf sources before this file.

set-option -g status-style bg=$darkgray

set-option -g window-status-current-style fg=$white,bg=$lightgray

set-option -g pane-active-border-style fg=default
set-option -g pane-active-border-style bg=default

set -g status-left ' #S '
set -g status-left-style bg=$blue,fg=$black
set -g status-left-length 30


setw -g automatic-rename on
setw -g automatic-rename-format "#{pane_current_command}"

setw -g window-status-format         ' #(echo "#{pane_current_command}")#F '
setw -g window-status-current-format ' #(echo "#{pane_current_command}")#F '
set -g status-right ' #h '

# highlighting
set -g mode-style fg=$black,bg=$yellow

# command prompt
set -g message-command-style fg=$yellow,bg=$darkgray
set -g message-style fg=$yellow,bg=$black
