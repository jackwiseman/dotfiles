# Route files opened via macOS "Open With" / Finder / `open` / `kitty +open`
# into nvim in a new kitty OS window. First matching rule wins.

# Config / data files
protocol file
ext yml,yaml,toml,json,conf,ini,lua,fish,vim
action launch --type=os-window -- nvim -- $FILE_PATH

# Source code
protocol file
ext go,py,js,ts,jsx,tsx,sh,rs,c,h,hpp,cpp,rb,md,markdown,txt
action launch --type=os-window -- nvim -- $FILE_PATH

# Dotfiles / extensionless build files
protocol file
file Dockerfile,Makefile,justfile,.gitignore,.zshrc,.zshenv,.zprofile
action launch --type=os-window -- nvim -- $FILE_PATH

# Catch-all: anything kitty detects as text
protocol file
mime text/*
action launch --type=os-window -- nvim -- $FILE_PATH
