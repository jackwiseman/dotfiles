# Gruvbox Dark palette — single source of truth for theming.
# Consumed by templated configs (tmux, kitty, waybar, sway).
# Canonical names from https://github.com/morhetz/gruvbox; quote the
# leading '#' so YAML doesn't treat it as a comment.
gruvbox:
  # backgrounds (dark -> light)
  bg0_h: "#1d2021"
  bg0:   "#282828"
  bg0_s: "#32302f"
  bg1:   "#3c3836"
  bg2:   "#504945"
  bg3:   "#665c54"
  bg4:   "#7c6f64"
  # foregrounds (light -> dark)
  fg0:   "#fbf1c7"
  fg1:   "#ebdbb2"
  fg2:   "#d5c4a1"
  fg3:   "#bdae93"
  fg4:   "#a89984"
  gray:  "#928374"
  # normal
  red:    "#cc241d"
  green:  "#98971a"
  yellow: "#d79921"
  blue:   "#458588"
  purple: "#b16286"
  aqua:   "#689d6a"
  orange: "#d65d0e"
  # bright
  bright_red:    "#fb4934"
  bright_green:  "#b8bb26"
  bright_yellow: "#fabd2f"
  bright_blue:   "#83a598"
  bright_purple: "#d3869b"
  bright_aqua:   "#8ec07c"
  bright_orange: "#fe8019"
